name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run unit tests
        run: ./gradlew test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Issue #15: Roborazzi compares ComponentSnapshotTest's renders against the goldens in
      # app/src/test/snapshots (recorded on CI via .github/workflows/record-snapshots.yml), so
      # unreviewed pixel drift in the tokenized components fails the PR. See
      # docs/snapshot-testing.md.
      - name: Verify snapshots (design-token guardrail)
        # Self-skipping until goldens exist: record-snapshots.yml can only be
        # dispatched once it's on the default branch, so the first goldens are
        # recorded right after this merges (bootstrap documented in
        # docs/snapshot-testing.md).
        run: |
          if ls app/src/test/snapshots/*.png >/dev/null 2>&1; then
            ./gradlew verifyRoborazziDebug
          else
            echo "No goldens recorded yet — skipping verify (bootstrap)."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapshot-diffs
          path: |
            app/build/outputs/roborazzi/
            app/src/test/snapshots/*_compare.png
          if-no-files-found: ignore

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: short-sha
        run: echo "sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-debug-${{ steps.short-sha.outputs.sha }}
          path: app/build/outputs/apk/debug/*.apk

  composite-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Both platforms commit their snapshots, so the gallery needs only this
      # working tree + a public shallow clone of the web repo. The pairing
      # script lives canonically in chores-web-design-tokens (issue #6 there).
      - name: Fetch web baselines and gallery script
        run: |
          git clone --depth 1 https://github.com/derekwinters/chores-web-frontend /tmp/web
          curl -fsSL -o /tmp/composite-gallery.mjs https://raw.githubusercontent.com/derekwinters/chores-web-design-tokens/main/scripts/composite-gallery.mjs

      - name: Build composite gallery
        run: node /tmp/composite-gallery.mjs --web /tmp/web/.visual-baselines --android app/src/test/snapshots --out gallery/index.html

      - name: Upload gallery artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: composite-gallery
          path: gallery/index.html

      - name: Comment gallery link on themed-component changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -qE '^app/src/(main/java/com/derekwinters/chores/ui/|test/snapshots/)'; then
            body="📸 Composite visual gallery (web ↔ android side by side) for this PR: download the \`composite-gallery\` artifact from this run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --edit-last --body "$body" \
              || gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body "$body"
          else
            echo "No themed-component changes; skipping comment."
          fi
