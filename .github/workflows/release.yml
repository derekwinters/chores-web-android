# Manual backfill/recovery path: build the release APK for an existing tag and attach it
# to that tag's GitHub Release. Normal releases are built by the build-and-attach job in
# .github/workflows/release-please.yml, in the same run that creates the release.
#
# This workflow used to trigger on tag pushes ("v*"). That trigger was abandoned (issue #18)
# for two reasons:
#   1. Release Please creates tags with the default GITHUB_TOKEN, and GitHub never fires
#      workflows from GITHUB_TOKEN-initiated events — automated releases silently never
#      triggered this workflow.
#   2. Tag-triggered runs execute the workflow file frozen at the tag's commit. The v1.0.0
#      run failed the org's SHA-pinning policy because the tag predates the pinned action
#      refs, and re-running could never fix it. Dispatched runs use the current workflow
#      from main while checking out the requested tag, so they can't hit that trap.
name: Release APK Backfill (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach the APK to (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-attach-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build final release (debug-signed)
        run: ./gradlew assembleRelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ inputs.tag }}
          files: app/build/outputs/apk/release/*.apk
