# Issue #15 (design-token rollout iteration 5): records Roborazzi snapshot goldens on a CI
# runner and commits them back to the given branch. Goldens must be recorded here rather than
# on developer machines so the pixels come from the same environment pr.yml's
# verifyRoborazziDebug step compares against (same OS/font stack -> deterministic rendering).
# Usage: Actions -> "Record Snapshots" -> Run workflow -> enter the branch name.
# See docs/snapshot-testing.md.
name: Record Snapshots

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to record snapshot goldens on (goldens are committed back to this branch)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Record snapshot goldens
        run: ./gradlew recordRoborazziDebug
        env:
          # Needed for the design-tokens Maven repo (GitHub Packages) — see settings.gradle.kts.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/test/snapshots
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
          else
            git commit -m "test: record snapshot goldens [skip ci]"
            git push origin HEAD:${{ inputs.ref }}
          fi
