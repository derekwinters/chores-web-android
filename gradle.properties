org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# AGP 9.0+ defaults to built-in Kotlin support, which is incompatible with the
# org.jetbrains.kotlin.kapt plugin (still used here for Hilt's annotation processing — see
# app/build.gradle.kts dependencies). Disabling both flags keeps the project on the traditional
# (pre-AGP-9) Kotlin plugin model, where kapt continues to work as before.
# https://developer.android.com/r/tools/built-in-kotlin
android.builtInKotlin=false
android.newDsl=false

# Single source of truth for the app version. Bumped automatically by the
# Release Please workflow (.github/workflows/release-please.yml) via the
# "generic" extra-files updater, which locates this line by the
# x-release-please-version marker comment.
VERSION_NAME=1.0.0 # x-release-please-version
VERSION_CODE=1
